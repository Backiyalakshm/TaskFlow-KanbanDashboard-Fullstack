services:
  # =========================
  # MYSQL DATABASE
  # =========================
  mysql:
    image: mysql:8.0
    container_name: taskflow-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-taskflow}
      MYSQL_USER: ${DB_USER:-taskflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-taskflowpass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taskflow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =========================
  # SPRING BOOT BACKEND
  # =========================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: taskflow-backend
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-taskflow}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-taskflowpass}

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_PROFILES_ACTIVE: prod

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-86400000}

      # IMPORTANT FIX (NO PORT, ONLY DOMAIN)
      CORS_ALLOWED_ORIGINS: https://taskflow-kanban.duckdns.org

    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - taskflow-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # =========================
  # REACT / VITE FRONTEND
  # =========================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: taskflow-frontend
    ports:
      - "5173:5173"
    environment:
      # IMPORTANT FIX: NO localhost, ONLY DOMAIN
      VITE_API_URL: https://taskflow-kanban.duckdns.org/api
      VITE_WS_URL: wss://taskflow-kanban.duckdns.org/ws
    depends_on:
      - backend
    networks:
      - taskflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =========================
  # PHPMYADMIN
  # =========================
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: taskflow-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USER:-taskflow}
      PMA_PASSWORD: ${DB_PASSWORD:-taskflowpass}
      PMA_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    depends_on:
      - mysql
    networks:
      - taskflow-network
    restart: unless-stopped

# =========================
# VOLUMES
# =========================
volumes:
  mysql_data:

# =========================
# NETWORK
# =========================
networks:
  taskflow-network:
    driver: bridge

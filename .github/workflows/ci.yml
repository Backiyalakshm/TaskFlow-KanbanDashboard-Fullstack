name: TaskFlow CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: taskflow-backend-v2/backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Verify Maven
        run: mvn -version

      - name: Build Backend
        run: mvn clean package -DskipTests

  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: taskflow-frontend-v2/frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: taskflow-frontend-v2/frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npx vite build
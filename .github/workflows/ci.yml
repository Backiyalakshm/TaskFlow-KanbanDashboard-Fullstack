name: TaskFlow CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  backend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: taskflow-backend-v2/backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Backend
        run: mvn clean package -DskipTests

  frontend-build:
  runs-on: ubuntu-latest

  defaults:
    run:
      working-directory: taskflow-frontend-v2/frontend

  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm ci

    - name: Fix Permissions
      run: chmod +x node_modules/.bin/*

    - name: Build Frontend
      run: npx vite build